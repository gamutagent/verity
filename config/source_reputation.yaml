# ============================================================================
# Verity — Source Reputation Database
# Domain trust tiers for authenticity scoring (Layer 1).
#
# tier_1 (score: 1.0) — Authoritative: government registries, major wire
#   services, established financial press with editorial standards.
# tier_2 (score: 0.8) — Credible: established trade press, reputable
#   regional outlets, major platform blogs with editorial oversight.
# tier_3 (score: 0.5) — Acceptable: legitimate but lower-authority sources,
#   regional outlets, niche publications.
# blocklist (score: 0.0) — Never surface: known spam, SEO farms, AI content
#   mills, known disinformation sources.
#
# Subdomain resolution is automatic: blog.reuters.com → reuters.com → tier_1
# ============================================================================

tier_1:
  # Wire services & global financial press
  - reuters.com
  - bloomberg.com
  - ft.com
  - wsj.com
